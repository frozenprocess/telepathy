kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: telepathy-cilium
networking:
  # We install Cilium ourselves so policy enforcement actually works.
  # (kind's default kindnet CNI does NOT enforce NetworkPolicy.)
  disableDefaultCNI: true
  # Cilium's kubernetes IPAM carves each node's pod CIDR from this range, which
  # kube-controller-manager assigns. 10.244.0.0/16 is the conventional kind pod
  # subnet (matches the Antrea config).
  podSubnet: "10.244.0.0/16"
nodes:
  - role: control-plane
  - role: worker
