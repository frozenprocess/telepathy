name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

permissions:
  contents: read

jobs:
  # Verify that every commit in the PR is signed off per the DCO.
  dco:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check DCO sign-off
        uses: dcoapp/app@v4  # renovate: datasource=github-tags depName=dcoapp/app

  # Build the engine, run the unit tests, and dogfood the two CI gates against
  # the sample data (assertions + base-vs-PR diff) using the host toolchain.
  build-test:
    runs-on: ubuntu-latest
    env:
      GOTOOLCHAIN: auto
      CGO_ENABLED: "0"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build (clones the pinned Calico + Antrea trees, wires both go.work files)
        run: make build
      - name: Unit tests — shell + api contract + Calico provider
        # Scope to the project's own packages: ./... would also pull the
        # workspace's third_party/calico tree (incl. the cgo-only Felix BPF
        # packages, which don't build under CGO_ENABLED=0).
        run: go test . ./api/... ./provider/...
      - name: Unit tests — out-of-process Antrea engine
        # Its own module/workspace (Antrea's native dependency versions), so it
        # is tested from inside engines/antrea. `make build` wired its go.work.
        run: cd engines/antrea && go test ./...
      - name: Unit tests — out-of-process Cilium engine
        run: cd engines/cilium && go test ./...
      # - name: Assertion gate (make verify)
      #   run: make verify
      - name: Full assertion sweep (make verify-all — every e2e/testdata/<case>/, every provider)
        run: |
          make verify-all PROVIDER=calico
          make verify-all PROVIDER=antrea
          make verify-all PROVIDER=cilium
      - name: Connectivity diff demo (make diff-demo)
        run: make diff-demo

  # Stand up a real kind cluster per CNI and compare each testdata case's actual
  # connectivity against the engine. Matrix so Calico and Antrea run in parallel.
  e2e:
    # Full cluster comparison is the release gate only: a v* tag push. Every
    # other event relies on make verify / verify-all in build-test (engine vs
    # the recorded `expect` in each case's assertions.yaml — no cluster).
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write # attach the e2e report to the release
    strategy:
      fail-fast: false
      matrix:
        cni: [calico, antrea, cilium]
    env:
      GOTOOLCHAIN: auto
      CGO_ENABLED: "0"
      # Absolute: `go test ./e2e/...` runs with cwd=e2e/, so a relative path would
      # land there instead of where the upload step looks.
      E2E_REPORT: ${{ github.workspace }}/e2e-report-${{ matrix.cni }}.txt
      E2E_TIMEOUT: 120m
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Install kind
        uses: helm/kind-action@v1  # renovate: datasource=github-tags depName=helm/kind-action
        with:
          install_only: true
      - name: Load sctp module (Calico SCTP cases)
        if: matrix.cni == 'calico'
        run: sudo modprobe sctp
      - name: Run e2e (${{ matrix.cni }})
        # Calico also exercises the HostEndpoint cases (E2E_INCLUDE_HEP); they
        # narrow Calico's failsafes cluster-wide while running, so they're opt-in.
        env:
          E2E_INCLUDE_HEP: ${{ matrix.cni == 'calico' && '1' || '' }}
        run: make e2e PROVIDER=${{ matrix.cni }}
      - name: Attach e2e report to release
        # always(): attach the report even when e2e fails — that's when it's most
        # useful. The harness writes it via E2E_REPORT.
        if: always()
        uses: softprops/action-gh-release@v2  # renovate: datasource=github-tags depName=softprops/action-gh-release
        with:
          files: ${{ env.E2E_REPORT }}

  # Exercise the published Action end to end against a locally built image, so
  # the action.yml + script can't rot. On PRs this also posts the diff comment.
  action-selftest:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # the base-vs-PR diff needs history
      - name: Build engine image
        run: make image IMAGE=telepathy:ci
      - name: Run Telepathy check
        uses: ./
        with:
          image: telepathy:ci
          topology: e2e/testdata/sample-topology.yaml
          policy: e2e/testdata/sample-policy.yaml
          assertions: e2e/testdata/sample-assertions.yaml
          mode: both
          comment: ${{ github.event_name == 'pull_request' }}
