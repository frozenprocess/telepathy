name: Release image

# Publish the calico-engine image to GHCR so the Telepathy Action's default
# image (ghcr.io/<owner>/<repo>:latest) exists for consumers. Runs on version
# tags (v*) and can be triggered manually.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
          build-args: |
            ENGINE_VERSION=${{ github.ref_name }}
            GIT_COMMIT=${{ github.sha }}
