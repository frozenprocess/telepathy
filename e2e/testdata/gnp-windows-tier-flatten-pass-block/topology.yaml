# Topology for testcase 'gnp-windows-tier-flatten-pass-block'.
# Intent: prove that flattening tiers on Windows changes the verdict when the last
# tier ends in Pass. server (app=server) is selected by a default-tier policy
# whose only rule matches server-as-source, so a client->server flow falls through
# to the default tier's Pass default. On Linux that reaches the namespace profile
# (allow); on Windows the flattener turns the trailing Pass into Block (deny) and
# never consults profiles. Both pods run on Windows nodes so the receiver's HNS
# ingress is what enforces the flattened policy. Only runs under E2E_OS=windows.
#
# Self-contained telepathy Request. Run:
#   telepathy test -assert assertions.yaml -policy policy.yaml < topology.yaml
namespaces:
  - name: prod
    labels:
      purpose: policy-eval
      kubernetes.io/metadata.name: prod
endpoints:
  - id: prod/server
    namespace: prod
    name: server
    ip: 10.0.0.1
    labels:
      app: server
    nodeSelector:
      kubernetes.io/os: windows
    ports:
      - name: http
        port: 8080
        protocol: tcp
  - id: prod/client
    namespace: prod
    name: client
    ip: 10.0.0.2
    labels:
      app: client
    nodeSelector:
      kubernetes.io/os: windows
    ports:
      - name: http
        port: 8080
        protocol: tcp
port: 8080
protocol: tcp
