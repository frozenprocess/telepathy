# The default (last) tier is set to defaultAction: Pass, and a policy in it
# selects the server but only allows the server-as-its-own-source (a rule that no
# real client flow matches). So a client->server flow matches no rule and hits the
# tier's Pass default.
#
# On Linux: Pass on the last tier means "fall through to the profiles"; the prod
# namespace's default profile allows the flow -> ALLOW.
#
# On Windows/HNS: tiers are flattened into one ACL list. A trailing Pass in the
# last tier is rewritten to Block, and because the default tier carries a policy
# the profiles are never appended as a fallback. The flattened server ingress is
# [Allow source=server, Block any] -> the client hits the Block -> DENY.
#
# (The source selector is `app == 'server'` — a real, non-empty endpoint set — on
# purpose: an empty selector renders on HNS as an empty RemoteAddresses, which HNS
# treats as "any", masking the tier effect behind an accidental allow-all.)
apiVersion: projectcalico.org/v3
kind: Tier
metadata:
  name: default
spec:
  defaultAction: Pass
---
apiVersion: projectcalico.org/v3
kind: GlobalNetworkPolicy
metadata:
  name: server-noop
spec:
  selector: app == 'server'
  types:
    - Ingress
  ingress:
    - action: Allow
      source:
        selector: app == 'server'
