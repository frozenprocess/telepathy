# Policy dialect, decided by apiVersion.
#   k8s    - upstream Kubernetes networking API (networking.k8s.io);
#            evaluated by every engine.
#   calico - projectcalico.org CRDs; evaluated only by the calico engine.
# `make verify-all PROVIDER=<x>` runs a case when flavor==k8s or flavor==<x>.
flavor: calico

# Probe role:external endpoints from off-cluster Docker containers on the kind
# network (the clients a host-port doNotTrack firewall is meant to govern),
# dialing <node-IP>:8080 directly — the only externally routable vantage, and the
# one the doNotTrack raw-table chain actually sees. Requires E2E_INCLUDE_HEP=1
# since the case attaches a HostEndpoint.
externalProbe: true

# Needs a worker the HostEndpoint can land on (HEPs are steered off the control
# plane). Control-plane + 1 worker is enough; there are no in-cluster pods to
# colocate against, so the pod<->host same-node limitation that forced 3 nodes
# in the pod-matrix design no longer applies.
minNodes: 2

# Validate the rendered Calico dataplane cost weight against the live
# node (Calico + Linux only; see e2e/cost.go).
cost: false
