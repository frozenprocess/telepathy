# Topology for testcase 'prod-allow-from-dev-namespace-k8s-cnp'.
# Intent: Using an upstream policy.networking.k8s.io/v1alpha2 ClusterNetworkPolicy in the Admin tier, allow pods in namespaces labeled env=prod to receive ingress only from pods in namespaces labeled env=dev, and deny all other ingress to prod. Egress out of prod and all traffic to dev are unaffected. This mirrors the Calico GlobalNetworkPolicy case prod-allow-from-dev-namespace-calico, but as the upstream cluster-scoped resource Calico converts from k8s ClusterNetworkPolicy into kube-admin tier.
#
# Self-contained telepathy Request (endpoints + namespaces + probe + any
# host endpoints / services / network sets the policy references). Run:
#   telepathy test -assert assertions.yaml -policy policy.yaml < topology.yaml
namespaces:
  - name: prod
    labels:
      env: prod
      purpose: policy-eval
      kubernetes.io/metadata.name: prod
  - name: dev
    labels:
      env: dev
      purpose: policy-eval
      kubernetes.io/metadata.name: dev
endpoints:
  - id: prod/frontend
    namespace: prod
    name: frontend
    ip: 10.0.0.1
    labels:
      app: frontend
      tier: web
      env: prod
    ports:
      - name: http
        port: 8080
        protocol: tcp
      - name: udp-echo
        port: 8081
        protocol: udp
    node: telepathy-e2e-calico-control-plane
  - id: prod/backend
    namespace: prod
    name: backend
    ip: 10.0.0.2
    labels:
      app: backend
      tier: app
      env: prod
    ports:
      - name: http
        port: 8080
        protocol: tcp
      - name: udp-echo
        port: 8081
        protocol: udp
    node: telepathy-e2e-calico-worker
  - id: prod/database
    namespace: prod
    name: database
    ip: 10.0.0.3
    labels:
      app: database
      tier: data
      env: prod
    ports:
      - name: http
        port: 8080
        protocol: tcp
      - name: udp-echo
        port: 8081
        protocol: udp
    node: telepathy-e2e-calico-worker
  - id: dev/frontend
    namespace: dev
    name: frontend
    ip: 10.0.0.4
    labels:
      app: frontend
      tier: web
      env: dev
    ports:
      - name: http
        port: 8080
        protocol: tcp
      - name: udp-echo
        port: 8081
        protocol: udp
    node: telepathy-e2e-calico-control-plane
  - id: dev/backend
    namespace: dev
    name: backend
    ip: 10.0.0.5
    labels:
      app: backend
      tier: app
      env: dev
    ports:
      - name: http
        port: 8080
        protocol: tcp
      - name: udp-echo
        port: 8081
        protocol: udp
    node: telepathy-e2e-calico-worker
  - id: dev/database
    namespace: dev
    name: database
    ip: 10.0.0.6
    labels:
      app: database
      tier: data
      env: dev
    ports:
      - name: http
        port: 8080
        protocol: tcp
      - name: udp-echo
        port: 8081
        protocol: udp
    node: telepathy-e2e-calico-worker
port: 8080
protocol: tcp
