# Recipe 9: ALLOW traffic only to a certain port of an application.
# Selects app=apiserver and allows ingress only from role=monitoring pods AND
# only on port 5000. Monitoring reaching 5000 is allowed; monitoring on any
# other port, or any non-monitoring source, is denied.
kind: NetworkPolicy
apiVersion: networking.k8s.io/v1
metadata:
  name: api-allow-5000
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: apiserver
  ingress:
  - ports:
    - port: 5000
    from:
    - podSelector:
        matchLabels:
          role: monitoring
