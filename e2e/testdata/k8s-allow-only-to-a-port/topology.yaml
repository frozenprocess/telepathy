namespaces:
  - name: default
    labels: { kubernetes.io/metadata.name: default }
endpoints:
  - id: default/apiserver
    namespace: default
    name: apiserver
    ip: 10.0.0.1
    labels: { app: apiserver }
    ports:
      - { name: http, port: 8080, protocol: tcp }
      - { name: metrics, port: 5000, protocol: tcp }
  - id: default/monitoring
    namespace: default
    name: monitoring
    ip: 10.0.0.2
    labels: { role: monitoring }
    ports: [ { name: http, port: 8080, protocol: tcp } ]
  - id: default/client
    namespace: default
    name: client
    ip: 10.0.0.3
    labels: { app: client }
    ports: [ { name: http, port: 8080, protocol: tcp } ]
port: 8080
protocol: tcp
