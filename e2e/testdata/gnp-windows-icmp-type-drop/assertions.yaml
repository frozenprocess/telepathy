# Values encode the LINUX verdict (== engine prediction).
assertions:
  # Linux honours the ICMP type rule -> ping allowed (actual behaviour).
  - {from: winapp/sender, to: winapp/receiver-lin, expect: allow, protocol: icmp}
  # Windows drops the icmp.type rule -> ping denied -> DIFF.
  - {from: winapp/sender, to: winapp/receiver-win, expect: allow, protocol: icmp}
  # TCP hits the implicit default-deny on both (control).
  - {from: winapp/sender, to: winapp/receiver-win, expect: deny, protocol: tcp, port: 8080}
