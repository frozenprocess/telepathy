# Topology for testcase 'gnp-named-port-ingress'.
# Intent: verify the engine resolves a destination named port. server (app=server)
# names port 8080 "http" and also listens on 9090. A policy allows TCP to the
# named port http; 8080 must be allowed, 9090 denied by the implicit default-deny.
# client is the source.
#
# Self-contained telepathy Request. Run:
#   telepathy test -assert assertions.yaml -policy policy.yaml < topology.yaml
namespaces:
  - name: prod
    labels:
      purpose: policy-eval
      kubernetes.io/metadata.name: prod
endpoints:
  - id: prod/server
    namespace: prod
    name: server
    ip: 10.0.0.1
    labels:
      app: server
    ports:
      - name: http
        port: 8080
        protocol: tcp
      - name: alt
        port: 9090
        protocol: tcp
  - id: prod/client
    namespace: prod
    name: client
    ip: 10.0.0.2
    labels:
      app: client
    ports:
      - name: http
        port: 8080
        protocol: tcp
port: 8080
protocol: tcp
