# Values encode the LINUX verdict (== engine prediction). Allow-flows are same-OS.
assertions:
  # 8080: Linux DENIES (actual), Windows drops the notPorts Deny -> ALLOWS -> DIFF.
  - {from: prod/client-lin, to: prod/server-lin, expect: deny,  protocol: tcp, port: 8080}
  - {from: prod/client-win, to: prod/server-win, expect: deny,  protocol: tcp, port: 8080}
  # 9090: the excepted port, allowed on both (controls).
  - {from: prod/client-lin, to: prod/server-lin, expect: allow, protocol: tcp, port: 9090}
  - {from: prod/client-win, to: prod/server-win, expect: allow, protocol: tcp, port: 9090}
