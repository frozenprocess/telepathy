# Connectivity assertions for 'gnp-windows-notports-deny-bypass'.
#
# Values encode the LINUX verdict (== engine prediction), so engine-only
# `verify-all` passes. On a Windows cluster the notPorts Deny rule is dropped and
# TCP/8080 is allowed by the fall-through Allow — the harness reports DIFF
# (engine=deny, cluster=allow) on the :8080 row. That DIFF is the proof.
assertions:
  # 8080 is NOT the excepted port, so Linux (and the engine) DENY it. Windows drops
  # the notPorts Deny rule and ALLOWS it -> DIFF here.
  - from: prod/client
    to: prod/server
    expect: deny
    protocol: tcp
    port: 8080
  # 9090 is the excepted port: allowed on both dataplanes (control row, no DIFF).
  - from: prod/client
    to: prod/server
    expect: allow
    protocol: tcp
    port: 9090
