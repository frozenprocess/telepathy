# Topology for testcase 'gnp-windows-notports-deny-bypass'.
# Mirrored on both OSes, allow-flows probed SAME-OS. Policy (Deny TCP notPorts 9090,
# then Allow) blocks 8080 on Linux but the notPorts Deny is dropped on Windows.
#   - Linux: 8080 denied (actual), 9090 allowed. Windows: 8080 allowed (DIFF).
# Only runs under E2E_OS=windows; -lin endpoints pinned to Linux explicitly.
namespaces:
  - name: prod
    labels: {purpose: policy-eval, kubernetes.io/metadata.name: prod}
endpoints:
  - {id: prod/server-win, namespace: prod, name: server-win, ip: 10.0.0.1, labels: {app: server}, nodeSelector: {kubernetes.io/os: windows}, ports: [{name: http, port: 8080, protocol: tcp}, {name: alt, port: 9090, protocol: tcp}]}
  - {id: prod/server-lin, namespace: prod, name: server-lin, ip: 10.0.0.4, labels: {app: server}, nodeSelector: {kubernetes.io/os: linux},   ports: [{name: http, port: 8080, protocol: tcp}, {name: alt, port: 9090, protocol: tcp}]}
  - {id: prod/client-win, namespace: prod, name: client-win, ip: 10.0.0.2, labels: {app: client}, nodeSelector: {kubernetes.io/os: windows}, ports: [{name: http, port: 8080, protocol: tcp}]}
  - {id: prod/client-lin, namespace: prod, name: client-lin, ip: 10.0.0.5, labels: {app: client}, nodeSelector: {kubernetes.io/os: linux},   ports: [{name: http, port: 8080, protocol: tcp}]}
port: 8080
protocol: tcp
