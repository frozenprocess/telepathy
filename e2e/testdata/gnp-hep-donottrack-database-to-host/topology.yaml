# Topology for testcase 'gnp-hep-donottrack-database-to-host'.
# Intent: Stand up a Calico HostEndpoint on the kind node (wildcard interface) and attach a do-not-track GlobalNetworkPolicy plus its companion normal GlobalNetworkPolicy, both selecting the HEP and both denying database pods (selector app=='database') while allowing everything else. doNotTrack policy is evaluated statelessly in the iptables raw table (NOTRACK), so traffic terminating on the host endpoint has no conntrack and BOTH directions of a flow must independently pass; the companion normal policy is required because the packet still traverses the filter table afterward. Net effect on the host/<name> rows/cols: database<->host is denied in both directions (the do-not-track ingress deny on the reverse leg also blocks the forward leg, since there is no conntrack to permit the return path); every other host-terminating flow is allowed; pod-to-pod transit is unaffected.
#
# Self-contained telepathy Request (endpoints + namespaces + probe + any
# host endpoints / services / network sets the policy references). Run:
#   telepathy test -assert assertions.yaml -policy policy.yaml < topology.yaml
namespaces:
  - name: prod
    labels:
      env: prod
      purpose: policy-eval
      kubernetes.io/metadata.name: prod
  - name: dev
    labels:
      env: dev
      purpose: policy-eval
      kubernetes.io/metadata.name: dev
endpoints:
  - id: prod/frontend
    namespace: prod
    name: frontend
    ip: 10.0.0.1
    labels:
      app: frontend
      tier: web
      env: prod
    ports:
      - name: http
        port: 8080
        protocol: tcp
      - name: udp-echo
        port: 8081
        protocol: udp
    node: telepathy-e2e-calico-worker2
  - id: prod/backend
    namespace: prod
    name: backend
    ip: 10.0.0.2
    labels:
      app: backend
      tier: app
      env: prod
    ports:
      - name: http
        port: 8080
        protocol: tcp
      - name: udp-echo
        port: 8081
        protocol: udp
    node: telepathy-e2e-calico-worker
  - id: prod/database
    namespace: prod
    name: database
    ip: 10.0.0.3
    labels:
      app: database
      tier: data
      env: prod
    ports:
      - name: http
        port: 8080
        protocol: tcp
      - name: udp-echo
        port: 8081
        protocol: udp
    node: telepathy-e2e-calico-worker
  - id: dev/frontend
    namespace: dev
    name: frontend
    ip: 10.0.0.4
    labels:
      app: frontend
      tier: web
      env: dev
    ports:
      - name: http
        port: 8080
        protocol: tcp
      - name: udp-echo
        port: 8081
        protocol: udp
    node: telepathy-e2e-calico-worker2
  - id: dev/backend
    namespace: dev
    name: backend
    ip: 10.0.0.5
    labels:
      app: backend
      tier: app
      env: dev
    ports:
      - name: http
        port: 8080
        protocol: tcp
      - name: udp-echo
        port: 8081
        protocol: udp
    node: telepathy-e2e-calico-worker
  - id: dev/database
    namespace: dev
    name: database
    ip: 10.0.0.6
    labels:
      app: database
      tier: data
      env: dev
    ports:
      - name: http
        port: 8080
        protocol: tcp
      - name: udp-echo
        port: 8081
        protocol: udp
    node: telepathy-e2e-calico-worker
hostEndpoints:
  - name: kind-node-dnt
    node: telepathy-e2e-calico-worker2
    interfaceName: "*"
    expectedIPs:
      - 172.18.0.2
    labels:
      role: untracked-fw
port: 8080
protocol: tcp
