# Recipe 14: DENY external egress traffic.
# Egress from app=foo is denied except to the cluster DNS pods (k8s-app=kube-dns
# on port 53). In-cluster DNS resolves, but any other outbound connection --
# in-cluster or external -- is blocked.
#
# Deviation from the upstream recipe: the DNS namespace label is dns-system, not
# kube-system. The live e2e harness owns the namespaces it creates and cannot
# adopt the real kube-system, so DNS is modelled by a coredns stand-in (still
# labelled k8s-app=kube-dns) in a dns-system namespace -- the same substitution
# used by default-deny-all-namespaces-but-dns-calico.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: foo-deny-external-egress
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: foo
  policyTypes:
  - Egress
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: dns-system
      podSelector:
        matchLabels:
          k8s-app: kube-dns
    ports:
      - port: 53
        protocol: UDP
      - port: 53
        protocol: TCP
