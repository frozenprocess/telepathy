namespaces:
  - name: default
    labels: { kubernetes.io/metadata.name: default }
endpoints:
  - id: default/api
    namespace: default
    name: api
    ip: 10.0.0.1
    labels: { app: bookstore, role: api }
    ports: [ { name: http, port: 8080, protocol: tcp } ]
  - id: default/bookstore-web
    namespace: default
    name: bookstore-web
    ip: 10.0.0.2
    labels: { app: bookstore, role: web }
    ports: [ { name: http, port: 8080, protocol: tcp } ]
  - id: default/other
    namespace: default
    name: other
    ip: 10.0.0.3
    labels: { app: other }
    ports: [ { name: http, port: 8080, protocol: tcp } ]
port: 8080
protocol: tcp
