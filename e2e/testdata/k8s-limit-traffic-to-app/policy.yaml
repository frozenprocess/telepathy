# Recipe 2: LIMIT traffic to an application.
# Selects the api pods (app=bookstore AND role=api) and allows ingress only
# from pods carrying app=bookstore (same namespace). Any other source is denied
# by the implicit ingress default-deny this rule creates.
kind: NetworkPolicy
apiVersion: networking.k8s.io/v1
metadata:
  name: api-allow
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: bookstore
      role: api
  ingress:
  - from:
      - podSelector:
          matchLabels:
            app: bookstore
