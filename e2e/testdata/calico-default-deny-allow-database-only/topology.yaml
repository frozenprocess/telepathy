# Topology for testcase 'default-deny-allow-database-only'.
# Intent: Lock the cluster down to a default-deny posture across every namespace, with a single architectural exception: pods are still allowed to reach the shared database tier on TCP port 8080. Frontend and backend pods cannot talk to each other or to anything else; only database pods accept connections, and only on the database port.
#
# Self-contained telepathy Request (endpoints + namespaces + probe + any
# host endpoints / services / network sets the policy references). Run:
#   telepathy test -assert assertions.yaml -policy policy.yaml < topology.yaml
namespaces:
  - name: prod
    labels:
      env: prod
      purpose: policy-eval
      kubernetes.io/metadata.name: prod
  - name: dev
    labels:
      env: dev
      purpose: policy-eval
      kubernetes.io/metadata.name: dev
endpoints:
  - id: prod/frontend
    namespace: prod
    name: frontend
    ip: 10.0.0.1
    labels:
      app: frontend
      tier: web
      env: prod
    ports:
      - name: http
        port: 8080
        protocol: tcp
      - name: udp-echo
        port: 8081
        protocol: udp
    node: telepathy-e2e-calico-control-plane
  - id: prod/backend
    namespace: prod
    name: backend
    ip: 10.0.0.2
    labels:
      app: backend
      tier: app
      env: prod
    ports:
      - name: http
        port: 8080
        protocol: tcp
      - name: udp-echo
        port: 8081
        protocol: udp
    node: telepathy-e2e-calico-worker
  - id: prod/database
    namespace: prod
    name: database
    ip: 10.0.0.3
    labels:
      app: database
      tier: data
      env: prod
    ports:
      - name: http
        port: 8080
        protocol: tcp
      - name: udp-echo
        port: 8081
        protocol: udp
    node: telepathy-e2e-calico-worker
  - id: dev/frontend
    namespace: dev
    name: frontend
    ip: 10.0.0.4
    labels:
      app: frontend
      tier: web
      env: dev
    ports:
      - name: http
        port: 8080
        protocol: tcp
      - name: udp-echo
        port: 8081
        protocol: udp
    node: telepathy-e2e-calico-control-plane
  - id: dev/backend
    namespace: dev
    name: backend
    ip: 10.0.0.5
    labels:
      app: backend
      tier: app
      env: dev
    ports:
      - name: http
        port: 8080
        protocol: tcp
      - name: udp-echo
        port: 8081
        protocol: udp
    node: telepathy-e2e-calico-worker
  - id: dev/database
    namespace: dev
    name: database
    ip: 10.0.0.6
    labels:
      app: database
      tier: data
      env: dev
    ports:
      - name: http
        port: 8080
        protocol: tcp
      - name: udp-echo
        port: 8081
        protocol: udp
    node: telepathy-e2e-calico-worker
port: 8080
protocol: tcp
