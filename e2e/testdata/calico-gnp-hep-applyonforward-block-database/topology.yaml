# Topology for testcase 'gnp-hep-applyonforward-block-database'.
# Intent: Build a cluster-wide Calico forward-firewall: one wildcard-interface HostEndpoint per node (both labelled role=forward-firewall), plus a GlobalNetworkPolicy with applyOnForward: true that denies traffic to any database pod (selector app=='database') and allows everything else. Because applyOnForward is node-scoped, a HEP on every node is required so pod-to-pod transit toward */database is dropped no matter which node the pods run on; all other pod-to-pod traffic passes.
#
# Self-contained telepathy Request (endpoints + namespaces + probe + any
# host endpoints / services / network sets the policy references). Run:
#   telepathy test -assert assertions.yaml -policy policy.yaml < topology.yaml
namespaces:
  - name: prod
    labels:
      env: prod
      purpose: policy-eval
      kubernetes.io/metadata.name: prod
  - name: dev
    labels:
      env: dev
      purpose: policy-eval
      kubernetes.io/metadata.name: dev
endpoints:
  - id: prod/frontend
    namespace: prod
    name: frontend
    ip: 10.0.0.1
    labels:
      app: frontend
      tier: web
      env: prod
    ports:
      - name: http
        port: 8080
        protocol: tcp
      - name: udp-echo
        port: 8081
        protocol: udp
    node: telepathy-e2e-calico-worker2
  - id: prod/backend
    namespace: prod
    name: backend
    ip: 10.0.0.2
    labels:
      app: backend
      tier: app
      env: prod
    ports:
      - name: http
        port: 8080
        protocol: tcp
      - name: udp-echo
        port: 8081
        protocol: udp
    node: telepathy-e2e-calico-worker
  - id: prod/database
    namespace: prod
    name: database
    ip: 10.0.0.3
    labels:
      app: database
      tier: data
      env: prod
    ports:
      - name: http
        port: 8080
        protocol: tcp
      - name: udp-echo
        port: 8081
        protocol: udp
    node: telepathy-e2e-calico-worker
  - id: dev/frontend
    namespace: dev
    name: frontend
    ip: 10.0.0.4
    labels:
      app: frontend
      tier: web
      env: dev
    ports:
      - name: http
        port: 8080
        protocol: tcp
      - name: udp-echo
        port: 8081
        protocol: udp
    node: telepathy-e2e-calico-worker2
  - id: dev/backend
    namespace: dev
    name: backend
    ip: 10.0.0.5
    labels:
      app: backend
      tier: app
      env: dev
    ports:
      - name: http
        port: 8080
        protocol: tcp
      - name: udp-echo
        port: 8081
        protocol: udp
    node: telepathy-e2e-calico-worker
  - id: dev/database
    namespace: dev
    name: database
    ip: 10.0.0.6
    labels:
      app: database
      tier: data
      env: dev
    ports:
      - name: http
        port: 8080
        protocol: tcp
      - name: udp-echo
        port: 8081
        protocol: udp
    node: telepathy-e2e-calico-worker
hostEndpoints:
  - name: fwfw-worker2
    node: telepathy-e2e-calico-worker2
    interfaceName: "*"
    expectedIPs:
      - 172.18.0.2
    labels:
      role: forward-firewall
  - name: fwfw-worker
    node: telepathy-e2e-calico-worker
    interfaceName: "*"
    expectedIPs:
      - 172.18.0.4
    labels:
      role: forward-firewall
port: 8080
protocol: tcp
