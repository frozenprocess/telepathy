# Values encode the LINUX verdict (== engine prediction). Allow-flows are same-OS.
assertions:
  # client exempt from the Deny -> allowed on both dataplanes (positive controls).
  - {from: prod/client-lin, to: prod/server-lin, expect: allow, protocol: tcp, port: 8080}
  - {from: prod/client-win, to: prod/server-win, expect: allow, protocol: tcp, port: 8080}
  # database: Linux DENIES via the notSelector Deny (actual). Windows drops the
  # Deny rule -> ALLOWS -> DIFF. The Linux row is the actual behaviour.
  - {from: prod/database-lin, to: prod/server-lin, expect: deny, protocol: tcp, port: 8080}
  - {from: prod/database-win, to: prod/server-win, expect: deny, protocol: tcp, port: 8080}
