# Topology for testcase 'gnp-hep-donottrack-database-to-host'.
#
# Intent: a real doNotTrack (untracked) host firewall, in the scenario doNotTrack
# is actually designed for — external clients connecting to a host-networked
# server. A Calico HostEndpoint is attached to the node's real interface (eth0,
# NOT "*": Calico silently ignores doNotTrack on an all-interfaces HEP), and the
# harness stands up a hostNetwork agnhost on that node listening on :8080 (the
# "host/<name>" server). Two off-cluster observers on the kind network dial
# <node-IP>:8080 directly: one whose source CIDR the doNotTrack ingress rule
# DENIES, one it ALLOWS.
#
# doNotTrack policy runs statelessly in the iptables raw table (NOTRACK), so
# there is no conntrack and the reply leg is NOT auto-allowed — the egress rule
# must independently allow the server's return traffic. A companion NORMAL
# GlobalNetworkPolicy is required because, after the raw table, the packet still
# traverses the filter table, where the HostEndpoint default-denies anything the
# normal tier doesn't allow. The discriminating Deny lives only in the doNotTrack
# tier; the normal tier just allows everything so the doNotTrack tier is the sole
# decider (mirrors the workshop's redis-accelerator + k8s-worker pair).
#
# A source-CIDR discriminator is used on purpose: external clients have no Calico
# workload identity, so a host-port doNotTrack firewall matches on nets, not pod
# labels (unlike a pod-to-pod policy). The placeholder IPs below are rewritten to
# the observer containers' real kind-network addresses by the harness, which also
# rewrites the policy's source nets to match.
#
# Self-contained telepathy Request. Run:
#   telepathy test -assert assertions.yaml -policy policy.yaml < topology.yaml
endpoints:
  # Off-cluster observer whose source CIDR the doNotTrack policy DENIES.
  - id: world/blocked
    namespace: world
    name: blocked
    ip: 203.0.113.5
    role: external
    unpoliced: true
    labels:
      scope: internet
  # Off-cluster observer the doNotTrack policy ALLOWS (different source CIDR).
  - id: world/allowed
    namespace: world
    name: allowed
    ip: 198.51.100.7
    role: external
    unpoliced: true
    labels:
      scope: internet
hostEndpoints:
  - name: kind-node-dnt
    node: telepathy-e2e-calico-worker2
    interfaceName: eth0
    expectedIPs:
      - 172.18.0.2
    labels:
      role: untracked-fw
port: 8080
protocol: tcp
