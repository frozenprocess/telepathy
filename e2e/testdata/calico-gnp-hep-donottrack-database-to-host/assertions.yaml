# Connectivity assertions for 'gnp-hep-donottrack-database-to-host'.
# Both flows are off-cluster observer -> host-networked server (node-IP:8080),
# governed by the doNotTrack host firewall. The discriminator is source CIDR.
assertions:
  # Source CIDR denied by the doNotTrack ingress rule: dropped statelessly in the
  # raw table before reaching the server.
  - from: world/blocked
    to: host/kind-node-dnt
    expect: deny
  # Source CIDR not denied: ingress allows :8080, egress allows the return leg
  # (no conntrack to do it for us), and the normal companion clears the filter
  # table — the flow connects.
  - from: world/allowed
    to: host/kind-node-dnt
    expect: allow
