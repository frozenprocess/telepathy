# Calico-flavored: uses GlobalNetworkPolicy + HostEndpoint, so only the calico
# engine runs it. Verify engine-only (no cluster) with:
#   make verify-all CASE=secure-e2e-cluster
flavor: calico

# The case attaches a HostEndpoint (the kube-apiserver), so a full `make e2e`
# run needs host-endpoint support. Engine-only verification does not.
# HEP<->pod flows only reproduce on a live cluster when the HEP and the pods it
# polices land on different nodes, so require control-plane + 2 workers there;
# below that the harness skips rather than emit a false engine-vs-cluster diff.
minNodes: 3

# Validate the rendered Calico dataplane cost weight against the live
# node (Calico + Linux only; see e2e/cost.go).
cost: true
