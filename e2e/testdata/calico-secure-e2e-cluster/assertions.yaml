# Connectivity assertions for 'secure-e2e-cluster'. These are the intent of the
# hardening: the control plane keeps working, the app is isolated, and nothing
# reaches the kube-apiserver except the calico components.
assertions:
  # --- the flows the cluster needs (must survive the default-deny) ---
  - name: calico-apiserver reaches kube-apiserver on 6443
    from: calico-apiserver/calico-apiserver
    to: host/kube-apiserver
    expect: allow
    protocol: tcp
    port: 6443

  - name: kube-controllers reaches calico-apiserver on 5443
    from: calico-system/calico-kube-controllers
    to: calico-apiserver/calico-apiserver
    expect: allow
    protocol: tcp
    port: 5443

  - name: typha reaches calico-apiserver on 5443
    from: calico-system/calico-typha
    to: calico-apiserver/calico-apiserver
    expect: allow
    protocol: tcp
    port: 5443

  - name: app pod resolves DNS via coredns
    from: demo/frontend
    to: kube-system/coredns
    expect: allow
    protocol: udp
    port: 53

  # --- everything the default-deny must keep shut ---
  - name: attacker cannot reach backend
    from: demo/attacker
    to: demo/backend
    expect: deny
    protocol: tcp
    port: 8080

  - name: app pod cannot reach calico-apiserver
    from: demo/frontend
    to: calico-apiserver/calico-apiserver
    expect: deny
    protocol: tcp
    port: 5443

  - name: attacker cannot reach kube-apiserver
    from: demo/attacker
    to: host/kube-apiserver
    expect: deny
    protocol: tcp
    port: 6443

  - name: calico-apiserver is not opened back to the app
    from: calico-apiserver/calico-apiserver
    to: demo/backend
    expect: deny
    protocol: tcp
    port: 8080
