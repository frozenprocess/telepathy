# Topology for testcase 'secure-e2e-cluster'.
#
# A miniature of the e2e kind+Calico cluster's control plane, used to walk the
# "best practices for securing a Kubernetes environment" story from
# frozenprocess/Tigera-Presentations through telepathy: default-deny everything,
# then re-open exactly the flows the cluster needs to keep running, and prove
# with the engine that nothing else got opened.
#
# What is modelled:
#   - calico-system   : calico-kube-controllers, calico-typha  (WorkloadEndpoints)
#   - calico-apiserver : calico-apiserver                       (WorkloadEndpoint)
#   - kube-system     : coredns                                 (WorkloadEndpoint)
#   - demo            : frontend / backend / attacker  (an app the deny protects)
#   - the kube-apiserver: a HostEndpoint on the control-plane node. It is
#     host-networked, so it is NOT a pod/WorkloadEndpoint — the reason the
#     presentation's `selector: has(kubernetes.io/os)` pod selector can never
#     match it. Telepathy makes that visible: reach it by node IP, not selector.
#
# Self-contained telepathy Request. Run:
#   telepathy test -assert assertions.yaml -policy policy.yaml < topology.yaml
namespaces:
  - name: calico-system
    labels:
      kubernetes.io/metadata.name: calico-system
  - name: calico-apiserver
    labels:
      kubernetes.io/metadata.name: calico-apiserver
  - name: kube-system
    labels:
      kubernetes.io/metadata.name: kube-system
  - name: demo
    labels:
      kubernetes.io/metadata.name: demo
      env: demo

# Stand-in components are labelled `telepathy.tigera.io/app: <name>`, NOT the real
# `k8s-app: <name>` the live components wear. This matters on a real cluster: these
# agnhost stand-ins land in the ACTUAL calico-system / kube-system namespaces, and
# a Service adopts any pod carrying its selector labels in its namespace. A stand-in
# labelled `k8s-app: calico-typha` would join the real `calico-typha` Service's
# endpoints (breaking calico-node's Typha discovery cluster-wide); `k8s-app: kube-dns`
# would poison the real kube-dns Service. A telepathy-owned key no live Service selects
# keeps the stand-ins invisible to real Services while the case's own selectors (below
# and in policy.yaml) match them exactly as before. The recognizable VALUES are kept so
# the model still reads as "this is calico-typha". Never give a stand-in a live
# component's Service-selector label. (demo/* uses `app:` — safe: demo is test-created.)
endpoints:
  - id: calico-apiserver/calico-apiserver
    namespace: calico-apiserver
    name: calico-apiserver
    ip: 10.0.0.10
    labels:
      telepathy.tigera.io/app: calico-apiserver
    ports:
      - { name: apiserver, port: 5443, protocol: tcp }

  - id: calico-system/calico-kube-controllers
    namespace: calico-system
    name: calico-kube-controllers
    ip: 10.0.0.11
    labels:
      telepathy.tigera.io/app: calico-kube-controllers

  - id: calico-system/calico-typha
    namespace: calico-system
    name: calico-typha
    ip: 10.0.0.12
    labels:
      telepathy.tigera.io/app: calico-typha
    ports:
      - { name: typha, port: 5473, protocol: tcp }

  - id: kube-system/coredns
    namespace: kube-system
    name: coredns
    ip: 10.0.0.13
    labels:
      telepathy.tigera.io/app: kube-dns
    ports:
      - { name: dns, port: 53, protocol: udp }
      - { name: dns-tcp, port: 53, protocol: tcp }

  - id: demo/frontend
    namespace: demo
    name: frontend
    ip: 10.0.0.1
    labels:
      app: frontend

  - id: demo/backend
    namespace: demo
    name: backend
    ip: 10.0.0.2
    labels:
      app: backend
    ports:
      - { name: http, port: 8080, protocol: tcp }

  - id: demo/attacker
    namespace: demo
    name: attacker
    ip: 10.0.0.3
    labels:
      app: attacker

# The kube-apiserver: host-networked on the control-plane node, so it is a
# HostEndpoint, not a pod. This is the object the presentation's
# `calico-apiserver-to-kapi` policy actually needs to reach.
hostEndpoints:
  - name: kube-apiserver
    node: telepathy-e2e-calico-control-plane
    interfaceName: "*"
    expectedIPs:
      - 172.18.0.5
    labels:
      kubernetes.io/hostname: control-plane
      node-role.kubernetes.io/control-plane: ""

# Default probe; assertions override per-row with the real service ports.
port: 6443
protocol: tcp
