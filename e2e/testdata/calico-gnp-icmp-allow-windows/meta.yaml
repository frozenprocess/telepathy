# Policy dialect, decided by apiVersion (see gnp-icmp-allow for the full note).
flavor: calico

# This case pins the receiver to a Windows node, so it can only run against a
# cluster that has one. Skip (don't fail) unless the run targets Windows.
# The Linux sender is placed automatically: as the source of an ICMP flow the
# harness always pins it to a Linux node so it has busybox ping.
requiresOS: windows

# Validate the rendered Calico dataplane cost weight against the live
# node (Calico + Linux only; see e2e/cost.go).
cost: true
