# Connectivity assertions for 'gnp-egress-explicit-deny-then-allow' (derived from the testcase intent).
assertions:
  - from: prod/frontend
    to: prod/database
    expect: deny
  - from: prod/frontend
    to: dev/database
    expect: deny
  - from: prod/frontend
    to: prod/backend
    expect: allow
  - from: prod/frontend
    to: dev/frontend
    expect: allow
  - from: prod/frontend
    to: dev/backend
    expect: allow
  - from: prod/backend
    to: prod/frontend
    expect: allow
  - from: prod/backend
    to: prod/database
    expect: allow
