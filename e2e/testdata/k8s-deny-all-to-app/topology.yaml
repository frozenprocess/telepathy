namespaces:
  - name: default
    labels: { kubernetes.io/metadata.name: default }
endpoints:
  - id: default/web
    namespace: default
    name: web
    ip: 10.0.0.1
    labels: { app: web }
    ports: [ { name: http, port: 8080, protocol: tcp } ]
  - id: default/client
    namespace: default
    name: client
    ip: 10.0.0.2
    labels: { app: client }
    ports: [ { name: http, port: 8080, protocol: tcp } ]
port: 8080
protocol: tcp
