# Topology for testcase 'gnp-windows-negated-deny-bypass'.
# Intent: prove that a negated-match DENY rule is silently dropped on Windows/HNS,
# turning a Linux allow-list into an allow-all. server (app=server) is the policy
# target; client (app=client) is the one source the Deny exempts; database
# (app=database) is a source the Deny is meant to block on Linux. All three pods
# run on Windows nodes so the receiver's HNS ingress is what enforces the policy.
# Only runs under E2E_OS=windows (see meta.yaml).
#
# Self-contained telepathy Request. Run:
#   telepathy test -assert assertions.yaml -policy policy.yaml < topology.yaml
namespaces:
  - name: prod
    labels:
      purpose: policy-eval
      kubernetes.io/metadata.name: prod
endpoints:
  - id: prod/server
    namespace: prod
    name: server
    ip: 10.0.0.1
    labels:
      app: server
    nodeSelector:
      kubernetes.io/os: windows
    ports:
      - name: http
        port: 8080
        protocol: tcp
  - id: prod/client
    namespace: prod
    name: client
    ip: 10.0.0.2
    labels:
      app: client
    nodeSelector:
      kubernetes.io/os: windows
    ports:
      - name: http
        port: 8080
        protocol: tcp
  - id: prod/database
    namespace: prod
    name: database
    ip: 10.0.0.3
    labels:
      app: database
    nodeSelector:
      kubernetes.io/os: windows
    ports:
      - name: http
        port: 8080
        protocol: tcp
port: 8080
protocol: tcp
