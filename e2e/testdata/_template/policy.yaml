# =============================================================================
# policy.yaml — the policy under test, in the dialect declared by meta.yaml's
# `flavor:`. Layered in via `telepathy ... -policy policy.yaml`. May contain
# multiple documents separated by `---`.
#
# This template uses upstream Kubernetes NetworkPolicy (flavor: k8s), so it runs
# on every engine. The intent: default-deny ingress in the `demo` namespace,
# then allow only app=frontend -> app=backend on TCP/8080.
#
# For a calico-flavored case set flavor: calico in meta.yaml and write
# projectcalico.org/v3 objects here instead (GlobalNetworkPolicy, Tier,
# HostEndpoint with preDNAT/applyOnForward/doNotTrack, etc.). See sibling
# gnp-* cases for worked examples of each feature.
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: demo
spec:
  # Empty podSelector selects every pod in the namespace; with an Ingress type
  # and no ingress rules this denies all inbound traffic by default.
  podSelector: {}
  policyTypes:
    - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-frontend-to-backend
  namespace: demo
spec:
  podSelector:
    matchLabels:
      app: backend
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: frontend
      ports:
        - protocol: TCP
          port: 8080
