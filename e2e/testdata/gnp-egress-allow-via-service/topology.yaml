# Topology for testcase 'gnp-egress-allow-via-service'.
# Intent: Allow prod/frontend to make egress connections only to the Kubernetes Service backend-svc (namespace prod, selecting app=backend), denying all other egress. The egress-only GlobalNetworkPolicy permits destination.services backend-svc; Calico resolves the Service to its backend pod IPs, so frontend can reach prod/backend (which backs the Service) and the service VIP svc/prod/backend-svc, but not prod/database or dev/backend (a different namespace, outside this Service). No other pod is constrained.
#
# Self-contained telepathy Request (endpoints + namespaces + probe + any
# host endpoints / services / network sets the policy references). Run:
#   telepathy test -assert assertions.yaml -policy policy.yaml < topology.yaml
namespaces:
  - name: prod
    labels:
      env: prod
      purpose: policy-eval
      kubernetes.io/metadata.name: prod
  - name: dev
    labels:
      env: dev
      purpose: policy-eval
      kubernetes.io/metadata.name: dev
endpoints:
  - id: prod/frontend
    namespace: prod
    name: frontend
    ip: 10.0.0.1
    labels:
      app: frontend
      tier: web
      env: prod
    ports:
      - name: http
        port: 8080
        protocol: tcp
      - name: udp-echo
        port: 8081
        protocol: udp
    node: telepathy-e2e-calico-control-plane
  - id: prod/backend
    namespace: prod
    name: backend
    ip: 10.0.0.2
    labels:
      app: backend
      tier: app
      env: prod
    ports:
      - name: http
        port: 8080
        protocol: tcp
      - name: udp-echo
        port: 8081
        protocol: udp
    node: telepathy-e2e-calico-worker
  - id: prod/database
    namespace: prod
    name: database
    ip: 10.0.0.3
    labels:
      app: database
      tier: data
      env: prod
    ports:
      - name: http
        port: 8080
        protocol: tcp
      - name: udp-echo
        port: 8081
        protocol: udp
    node: telepathy-e2e-calico-worker
  - id: dev/frontend
    namespace: dev
    name: frontend
    ip: 10.0.0.4
    labels:
      app: frontend
      tier: web
      env: dev
    ports:
      - name: http
        port: 8080
        protocol: tcp
      - name: udp-echo
        port: 8081
        protocol: udp
    node: telepathy-e2e-calico-control-plane
  - id: dev/backend
    namespace: dev
    name: backend
    ip: 10.0.0.5
    labels:
      app: backend
      tier: app
      env: dev
    ports:
      - name: http
        port: 8080
        protocol: tcp
      - name: udp-echo
        port: 8081
        protocol: udp
    node: telepathy-e2e-calico-worker
  - id: dev/database
    namespace: dev
    name: database
    ip: 10.0.0.6
    labels:
      app: database
      tier: data
      env: dev
    ports:
      - name: http
        port: 8080
        protocol: tcp
      - name: udp-echo
        port: 8081
        protocol: udp
    node: telepathy-e2e-calico-worker
services:
  - name: backend-svc
    namespace: prod
    selector:
      app: backend
    ports:
      - port: 8080
        protocol: TCP
port: 8080
protocol: tcp
