# Two-CNP composition demonstrating the Admin tier's precedence over Baseline:
#
#   1. Baseline denies all ingress to prod (the "deny-by-default" floor a
#      platform team sets; what would apply if nothing else fires).
#   2. Admin accepts ingress to prod from dev — Admin tier is evaluated FIRST,
#      and an Admin Accept is a *final* decision: tier evaluation terminates
#      and Baseline never runs for that flow.
#
# This is the inversion of baseline-deny-with-np-carveout: there the exception
# was a per-namespace NetworkPolicy, here it's a cluster-wide Admin allow. The
# difference matters: an Admin rule is set by the cluster admin and cannot be
# overridden by an app team's NetworkPolicy in the prod namespace.
#
# Flows the model should learn:
#   * dev/* -> prod/*   ALLOW  (Admin Accept fires first; Baseline doesn't see it)
#   * prod/* -> prod/*  DENY   (no Admin rule matches; falls to Baseline Deny)
#   * any -> dev/*      ALLOW  (Baseline only targets prod)
apiVersion: policy.networking.k8s.io/v1alpha2
kind: ClusterNetworkPolicy
metadata:
  name: prod-admin-allow-from-dev
spec:
  tier: Admin
  priority: 10
  subject:
    namespaces:
      matchLabels:
        env: prod
  ingress:
    - name: allow-from-dev
      action: Accept
      from:
        - namespaces:
            matchLabels:
              env: dev
---
apiVersion: policy.networking.k8s.io/v1alpha2
kind: ClusterNetworkPolicy
metadata:
  name: prod-baseline-deny-all-ingress
spec:
  tier: Baseline
  priority: 100
  subject:
    namespaces:
      matchLabels:
        env: prod
  ingress:
    - name: deny-all
      action: Deny
      from:
        - namespaces: {}
