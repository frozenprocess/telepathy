# Values encode the LINUX verdict (== engine prediction).
assertions:
  # Linux DENIES the echo via the type-8 Deny (actual behaviour).
  - {from: winapp/sender, to: winapp/receiver-lin, expect: deny, protocol: icmp}
  # Windows drops the icmp.type Deny -> the ping is allowed -> DIFF.
  - {from: winapp/sender, to: winapp/receiver-win, expect: deny, protocol: icmp}
