# Topology for testcase 'gnp-windows-icmp-type-deny-bypass'.
# One Linux ICMP sender (auto-pinned; it needs busybox ping) probes two receivers
# with app==receiver, one per OS. Policy: Deny ICMP echo (type 8), then Allow ICMP.
#   - receiver-lin (Linux): Deny bites -> ping denied (actual behaviour).
#   - receiver-win (Windows): the icmp.type Deny is dropped -> ping allowed (DIFF).
# sender->receiver-lin is Linux->Linux; sender->receiver-win is Linux->Windows
# (ICMP works cross-OS, which the ICMP cases rely on). Only runs under E2E_OS=windows.
namespaces:
  - name: winapp
    labels: {purpose: policy-eval, kubernetes.io/metadata.name: winapp}
endpoints:
  # No nodeSelector: ICMP source is auto-pinned to a Linux node (busybox ping).
  - {id: winapp/sender,       namespace: winapp, name: sender,       ip: 10.0.0.1, labels: {app: sender},   ports: [{name: http, port: 8080, protocol: tcp}]}
  - {id: winapp/receiver-lin, namespace: winapp, name: receiver-lin, ip: 10.0.0.4, labels: {app: receiver}, nodeSelector: {kubernetes.io/os: linux},   ports: [{name: http, port: 8080, protocol: tcp}]}
  - {id: winapp/receiver-win, namespace: winapp, name: receiver-win, ip: 10.0.0.2, labels: {app: receiver}, nodeSelector: {kubernetes.io/os: windows}, ports: [{name: http, port: 8080, protocol: tcp}]}
port: 8080
protocol: icmp
