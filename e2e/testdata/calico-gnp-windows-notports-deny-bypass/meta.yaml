# Policy dialect, decided by apiVersion (see gnp-icmp-allow for the full note).
flavor: calico

# Windows-only. Same undocumented "negated match on a Deny opens a hole"
# divergence as gnp-windows-negated-deny-bypass, but via `notPorts` instead of
# `notSelector` — showing the drop is about the NEGATION, not one specific field.
# Skip (don't fail) unless the run targets Windows.
#
# What it proves: `destination.notPorts` is a negative match criterion, so Felix
# drops the whole rule on HNS (policysets.go: ruleHasNegativeMatches). The rule
# here is a DENY, so dropping it removes protection: TCP/8080 that Linux blocks is
# allowed on Windows via the fall-through Allow.
#
# How it proves it: assertions encode the LINUX verdict (== engine prediction), so
# engine-only `verify-all` passes. On a Windows cluster client->server:8080 is
# allowed while the engine still says deny -> DIFF (engine != cluster).
requiresOS: windows
#
# This case now mirrors the target on both OSes and probes each allow-flow SAME-OS:
# the -lin (Linux) row shows the ACTUAL/intended behaviour (engine == cluster, ok),
# beside the -win (Windows) row that DIFFs. Allow-flows must be same-OS because
# Windows<->Linux pod TCP is unreliable in the test cluster and would otherwise look
# like a policy deny.

# Validate the rendered Calico dataplane cost weight against the live
# node (Calico + Linux only; see e2e/cost.go).
cost: true
