# Connectivity assertions for 'gnp-egress-allow-external-cidr' (derived from the testcase intent).
assertions:
  - from: prod/frontend
    to: prod/backend
    expect: deny
  - from: prod/frontend
    to: prod/database
    expect: deny
  - from: prod/frontend
    to: dev/frontend
    expect: deny
  - from: prod/frontend
    to: dev/backend
    expect: deny
  - from: prod/frontend
    to: dev/database
    expect: deny
  - from: prod/frontend
    to: world/internet
    expect: allow
    protocol: icmp # real ping (realInternet), not a stand-in pod
  - from: prod/backend
    to: prod/frontend
    expect: allow
  - from: prod/backend
    to: prod/database
    expect: allow
  - from: prod/backend
    to: dev/frontend
    expect: allow
  - from: prod/backend
    to: dev/backend
    expect: allow
  - from: prod/backend
    to: dev/database
    expect: allow
