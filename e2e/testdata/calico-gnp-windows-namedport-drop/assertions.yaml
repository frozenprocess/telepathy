# Values encode the LINUX verdict (== engine prediction). Allow-flow is same-OS.
assertions:
  # Linux honours the named port -> allow (actual). Windows drops the rule -> deny -> DIFF.
  - {from: prod/client-lin, to: prod/server-lin, expect: allow, protocol: tcp, port: 8080}
  - {from: prod/client-win, to: prod/server-win, expect: allow, protocol: tcp, port: 8080}
