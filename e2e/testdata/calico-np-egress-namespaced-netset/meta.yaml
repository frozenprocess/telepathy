# Policy dialect, decided by apiVersion.
#   k8s    - upstream Kubernetes networking API (networking.k8s.io);
#            evaluated by every engine.
#   calico - projectcalico.org CRDs; evaluated only by the calico engine.
# `make verify-all PROVIDER=<x>` runs a case when flavor==k8s or flavor==<x>.
flavor: calico

# Validate the rendered Calico dataplane cost weight against the live
# node (Calico + Linux only; see e2e/cost.go).
cost: false

# world/internet is a REAL address: no stand-in pod. It resolves per run to a
# random public resolver and the internet assertion pings it out through the
# node's NAT (see _template/meta.yaml).
realInternet: true
