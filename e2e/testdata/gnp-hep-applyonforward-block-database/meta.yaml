# Policy dialect, decided by apiVersion.
#   k8s    - upstream Kubernetes networking API (networking.k8s.io);
#            evaluated by every engine.
#   calico - projectcalico.org CRDs; evaluated only by the calico engine.
# `make verify-all PROVIDER=<x>` runs a case when flavor==k8s or flavor==<x>.
flavor: calico

# Steer HostEndpoint relocation off the nodes hosting the pods this HEP must
# police across the host boundary. A "*"-interface HEP can't police traffic
# to/from a pod on its OWN node (that traffic rides a cali workload interface),
# so the host<->pod deny assertions (database -> host) only reproduce on the
# cluster when the HEP and the database pods land on different nodes.
hepAvoidColocation: true

# This case only reproduces on the dataplane when a worker hosts none of the
# database pods the HEP must police across the host boundary. With a single
# worker every pod shares it, the HEP is forced to colocate, and a "*"-interface
# HEP can't police same-node pod<->host traffic — so the database->host deny
# silently fails to enforce (engine deny vs cluster allow). Require control-plane
# + 2 workers; skip below that rather than emit a false DIFF.
minNodes: 3
